<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Rotation with Perspective</title>
    <style>
      .container {
        perspective: 800px;
        perspective-origin: 50px -50px;
        transform-style: preserve-3d;
        width: 400px;
        height: 400px;
        margin: 400px auto;
        border: 1px solid #ccc;
        position: relative;
        /* display: grid;
        place-items: center; */

        --r: 100px;
        --n: 5;
        --angel: 72deg;
        --cos-1angle: 0.309;
        --sin-1angle: 0.951;
        --cos-2angle: -0.809;
        --sin-2angle: 0.588;
        --cos-3angle: -0.809;
        --sin-3angle: -0.588;
        --cos-4angle: 0.309;
        --sin-4angle: -0.951;
      }

      .inner {
        width: 100px;
        height: 100px;
        position: absolute;
        top: 0;
        left: 0;
        /* transform-origin: 50px -50px; */

        /* background-color: lightblue; */
        /* transform: rotate3d(0, 1, 0, -43deg); */
        /* transform-style: preserve-3d; 保留3D变换效果 */
      }
      .box1 {
        background-color: #f00;
        z-index: 5;
      }
      .box2 {
        background-color: #fe0;
        top: calc(var(--r) * var(--cos-1angle) - var(--r) + var(--r) / 2);
        left: calc(var(--r) * var(--sin-1angle));
        transform: rotateY(calc(var(--angel) * 1));
        z-index: 4;
      }
      .box3 {
        background-color: #f0f;
        top: calc(var(--r) * var(--cos-2angle) - var(--r) + var(--r));
        left: calc(var(--r) * var(--sin-2angle));
        transform: rotateY(calc(var(--angel) * 2));
        z-index: 3;
      }
      .box4 {
        background-color: #f50;
        top: calc(var(--r) * var(--cos-3angle) - var(--r) + var(--r));
        left: calc(var(--r) * var(--sin-3angle));
        transform: rotateY(calc(var(--angel) * 3));
        z-index: 2;
      }
      .box5 {
        background-color: #50f;
        top: calc(var(--r) * var(--cos-4angle) - var(--r) + var(--r) / 2);
        left: calc(var(--r) * var(--sin-4angle));
        transform: rotateY(calc(var(--angel) * 4));
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1 inner"></div>
      <div class="box2 inner"></div>
      <div class="box3 inner"></div>
      <div class="box4 inner"></div>
      <div class="box5 inner"></div>
    </div>
  </body>
</html>
