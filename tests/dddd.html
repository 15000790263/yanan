  <script>
    function aaa(win, doc) {

      };
      var sendMessage = function () {
        win.addEventListener(
          'message',
          function (e) {
            console.log(11111111111);
            console.log(e.data);
            if (e.data.type === 'submit') {
              send(getAllData());
            } else if (e.data.type === 'read') {
              read(e.data.data);
            }
            cb.call(win, e.data);
          },
          false
        );
        return function (data) {
          ifr.postMessage(data, '*');
        };
      };

    }
