<!doctype html>
<html>
  <head>
    <title>贪吃蛇游戏</title>
    <style>
      canvas {
        border: 2px solid #333;
        background: #f0f0f0;
      }
      .game-info {
        font-size: 20px;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <div class="game-info">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const GRID_SIZE = 20;
      const CELL_SIZE = canvas.width / GRID_SIZE;

      let snake = [{ x: 10, y: 10 }];
      let food = generateFood();
      let dx = 1;
      let dy = 0;
      let score = 0;
      let gameLoop;

      // 生成食物（确保不在蛇身上）
      function generateFood() {
        while (true) {
          const newFood = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE),
          };
          if (!snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
            return newFood;
          }
        }
      }

      // 游戏主循环
      function update() {
        // 移动蛇头
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 碰撞检测
        if (
          head.x < 0 ||
          head.x >= GRID_SIZE ||
          head.y < 0 ||
          head.y >= GRID_SIZE ||
          snake.some(segment => segment.x === head.x && segment.y === head.y)
        ) {
          gameOver();
          return;
        }

        snake.unshift(head);

        // 吃食物检测
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          document.getElementById('score').textContent = score;
          food = generateFood();
        } else {
          snake.pop();
        }

        draw();
      }

      // 绘制画面
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制蛇
        snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? '#e74c3c' : '#2ecc71';
          ctx.fillRect(segment.x * CELL_SIZE, segment.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
        });

        // 绘制食物
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE - 2, CELL_SIZE - 2);
      }

      function gameOver() {
        clearInterval(gameLoop);
        alert(`游戏结束！得分：${score}`);
      }

      // 键盘控制
      document.addEventListener('keydown', event => {
        switch (event.key) {
          case 'ArrowUp':
            if (dy === 0) {
              dx = 0;
              dy = -1;
            }
            break;
          case 'ArrowDown':
            if (dy === 0) {
              dx = 0;
              dy = 1;
            }
            break;
          case 'ArrowLeft':
            if (dx === 0) {
              dx = -1;
              dy = 0;
            }
            break;
          case 'ArrowRight':
            if (dx === 0) {
              dx = 1;
              dy = 0;
            }
            break;
        }
      });

      // 开始游戏
      gameLoop = setInterval(update, 150);
    </script>
  </body>
</html>
